<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #111827; }
    .label { font: 600 20px Arial, sans-serif; fill: #111827; }
    .text { font: 16px Arial, sans-serif; fill: #374151; }
    .box { fill: #f9fafb; stroke: #4f46e5; stroke-width: 3; rx: 18; ry: 18; }
    .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="40" y="50" class="title">Self-Correcting SQL/Data Analyst</text>

  <rect x="40" y="110" width="240" height="120" class="box"/>
  <text x="70" y="150" class="label">User Upload</text>
  <text x="70" y="182" class="text">SQLite / CSV / Excel</text>
  <text x="70" y="208" class="text">Natural-language question</text>

  <rect x="340" y="110" width="250" height="120" class="box"/>
  <text x="375" y="150" class="label">Schema Inspection</text>
  <text x="370" y="182" class="text">List tables, columns</text>
  <text x="370" y="208" class="text">Sample rows, infer joins</text>

  <rect x="660" y="110" width="250" height="120" class="box"/>
  <text x="715" y="150" class="label">Qwen3-4B + LoRA</text>
  <text x="670" y="182" class="text">Draft SQL from schema context</text>
  <text x="670" y="208" class="text">Repair SQL from execution errors</text>

  <rect x="960" y="110" width="200" height="120" class="box"/>
  <text x="1000" y="150" class="label">SQL Executor</text>
  <text x="990" y="182" class="text">Run SQLite query</text>
  <text x="990" y="208" class="text">Return rows / error</text>

  <rect x="660" y="330" width="250" height="120" class="box"/>
  <text x="700" y="370" class="label">Self-Correction Loop</text>
  <text x="690" y="402" class="text">Execution error?</text>
  <text x="690" y="428" class="text">Empty suspicious result?</text>

  <rect x="960" y="330" width="200" height="120" class="box"/>
  <text x="1003" y="370" class="label">Final Output</text>
  <text x="990" y="402" class="text">Final SQL</text>
  <text x="980" y="428" class="text">Result table + summary</text>

  <path d="M280 170 L340 170" class="arrow"/>
  <path d="M590 170 L660 170" class="arrow"/>
  <path d="M910 170 L960 170" class="arrow"/>
  <path d="M1060 230 L1060 330" class="arrow"/>
  <path d="M960 390 L910 390" class="arrow"/>
  <path d="M785 230 L785 330" class="arrow"/>
  <path d="M910 390 L960 390" class="arrow"/>
</svg>
